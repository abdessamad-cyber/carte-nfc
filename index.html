<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abdessamad CHARRAFI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: 
                linear-gradient(rgba(10, 47, 230, 0.7), rgba(21, 143, 199, 0.7)),
                url('https://images.unsplash.com/photo-1551601651-2a8555f1a136?ixlib=rb-4.0.3&auto=format&fit=crop&w=2000&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }
        
        /* Effet de flou sur l'arrière-plan */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            z-index: -1;
        }
        
        .business-card {
            width: 100%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            transition: transform 0.3s ease;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        .business-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
        }
        
        .card-header {
            background: 
                linear-gradient(135deg, rgba(10, 47, 230, 0.9) 0%, rgba(21, 143, 199, 0.9) 100%),
                url('https://images.unsplash.com/photo-1582750433449-648ed127bb54?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80');
            background-size: cover;
            background-position: center;
            color: white;
            padding: 35px 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .card-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://images.unsplash.com/photo-1559757148-5c350d0d3c56?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80');
            background-size: cover;
            background-position: center;
            opacity: 0.1;
            mix-blend-mode: overlay;
        }
        
        .medical-icon {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 24px;
            color: rgba(255, 255, 255, 0.7);
        }
        
        .profile-image {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 4px solid rgba(255, 255, 255, 0.4);
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #ffffff 0%, #f8f9fa 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: #0a2fe6;
            overflow: hidden;
            position: relative;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }
        
        .profile-image::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4, #45b7d1, #96ceb4);
            border-radius: 50%;
            z-index: -1;
            animation: rotate 10s linear infinite;
        }
        
        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .profile-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            position: relative;
            z-index: 1;
        }
        
        .name {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 8px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }
        
        .title {
            font-size: 16px;
            opacity: 0.95;
            font-weight: 500;
            background: rgba(255, 255, 255, 0.2);
            padding: 8px 16px;
            border-radius: 20px;
            display: inline-block;
            backdrop-filter: blur(10px);
        }
        
        .card-body {
            padding: 30px;
            background: rgba(255, 255, 255, 0.98);
        }
        
        .contact-info {
            margin-bottom: 25px;
        }
        
        .info-item {
            display: flex;
            align-items: center;
            margin-bottom: 18px;
            padding: 12px;
            border-radius: 12px;
            transition: all 0.3s ease;
            background: rgba(248, 249, 250, 0.7);
            border: 1px solid rgba(222, 226, 230, 0.5);
        }
        
        .info-item:hover {
            background: rgba(10, 47, 230, 0.05);
            transform: translateX(5px);
            border-color: rgba(10, 47, 230, 0.2);
        }
        
        .icon {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0a2fe6 0%, #158fc7 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            color: white;
            font-size: 18px;
            box-shadow: 0 4px 10px rgba(10, 47, 230, 0.3);
        }
        
        .whatsapp-icon {
            background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
            box-shadow: 0 4px 10px rgba(37, 211, 102, 0.3);
        }
        
        .info-text {
            flex: 1;
        }
        
        .info-label {
            font-size: 12px;
            color: #6c757d;
            margin-bottom: 4px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .info-value {
            font-size: 15px;
            color: #2c3e50;
            font-weight: 600;
        }
        
        .whatsapp-link {
            color: #25D366;
            text-decoration: none;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            transition: all 0.3s;
            padding: 6px 12px;
            border-radius: 8px;
            background-color: rgba(37, 211, 102, 0.1);
            border: 1px solid rgba(37, 211, 102, 0.2);
        }
        
        .whatsapp-link:hover {
            background-color: rgba(37, 211, 102, 0.2);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(37, 211, 102, 0.3);
        }
        
        .whatsapp-link i {
            margin-right: 6px;
        }
        
        .social-links {
            display: flex;
            justify-content: center;
            margin-top: 25px;
            gap: 12px;
        }
        
        .social-link {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #2c3e50;
            text-decoration: none;
            transition: all 0.3s;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        
        .social-link:hover {
            transform: translateY(-5px);
        }
        
        .linkedin-link:hover {
            background: linear-gradient(135deg, #0077B5 0%, #00A0DC 100%);
            color: white;
            box-shadow: 0 8px 20px rgba(0, 119, 181, 0.4);
        }
        
        .twitter-link:hover {
            background: linear-gradient(135deg, #1DA1F2 0%, #0d8bd9 100%);
            color: white;
            box-shadow: 0 8px 20px rgba(29, 161, 242, 0.4);
        }
        
        .facebook-link:hover {
            background: linear-gradient(135deg, #4267B2 0%, #365899 100%);
            color: white;
            box-shadow: 0 8px 20px rgba(66, 103, 178, 0.4);
        }
        
        .instagram-link:hover {
            background: linear-gradient(135deg, #E1306C 0%, #C13584 100%);
            color: white;
            box-shadow: 0 8px 20px rgba(225, 48, 108, 0.4);
        }
        
        .card-footer {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            padding: 20px;
            text-align: center;
            font-size: 13px;
            color: #6c757d;
            border-top: 1px solid rgba(0, 0, 0, 0.05);
        }
        
        .add-contact {
            display: flex;
            justify-content: center;
            margin-top: 18px;
        }
        
        .add-contact-btn {
            display: inline-flex;
            align-items: center;
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
            box-shadow: 0 6px 15px rgba(40, 167, 69, 0.4);
            border: none;
            cursor: pointer;
            font-size: 14px;
        }
        
        .add-contact-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(40, 167, 69, 0.5);
        }
        
        .add-contact-btn i {
            margin-right: 8px;
        }
        
        @media (max-width: 480px) {
            .business-card {
                max-width: 100%;
            }
            
            .card-header {
                padding: 25px 15px;
            }
            
            .profile-image {
                width: 110px;
                height: 110px;
            }
            
            .name {
                font-size: 22px;
            }
        }
    </style>
</head>

</body>
